name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- CONTINUOUS INTEGRATION (CI) STAGE ---
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'          # Fix 1: was 'python-style'

    - name: Install Testing Dependencies
      run: pip install pytest

    - name: Run Tests
      run: pytest main.py -v            # Fix 2: -v for verbose output

    - name: Notify Telegram on CI Status
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 CI Pipeline Status: ${{ job.status }}
          Repository: ${{ github.repository }}
          Commit: ${{ github.event.head_commit.message }}

  # --- CONTINUOUS DEPLOYMENT (CD) STAGE ---
  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to DigitalOcean Droplet via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DO_HOST }}
        username: root
        key: ${{ secrets.DO_SSH_KEY }}
        script: |
          rm -rf /root/git-action-simulator

          git clone https://github.com/${{ github.repository }}.git /root/git-action-simulator   # Fix 3: added $ and /

          cd /root/git-action-simulator

          docker build -t my-python-image-1 .
          docker run -d --name python-app-container my-python-image-1

          sleep 2
          docker logs python-app-container
