name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- CONTINUOUS INTEGRATION (CI) STAGE ---
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Testing Dependencies
      run: pip install pytest

    - name: Run Tests
      run: pytest main.py -v

    - name: Notify Telegram on CI Status
      if: always()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🚀 CI Pipeline Status: ${{ job.status }}
          Repository: ${{ github.repository }}
          Commit: ${{ github.event.head_commit.message }}

  # --- CONTINUOUS DEPLOYMENT (CD) STAGE ---
  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to DigitalOcean Droplet via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DO_HOST }}
        username: root
        key: ${{ secrets.DO_SSH_KEY }}
        script: |
          # 1. Pull fresh code
          rm -rf /root/git-action-simulator
          git clone https://github.com/${{ github.repository }}.git /root/git-action-simulator
          cd /root/git-action-simulator

          # 2. Clean up old container and image
          docker stop python-app-container || true
          docker rm python-app-container || true
          docker rmi my-python-image || true

          # 3. Build fresh image on server
          docker build -t my-python-image .

          # 4. Run container and show logs
          docker run --name python-app-container my-python-image
          docker logs python-app-container
